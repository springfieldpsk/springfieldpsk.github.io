ord">class</span> <span class="title">GetMqttMes</span> : <span class="title">MonoBehaviour</span></span><br><span class="line">&#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> TMP_InputField UrlInput;</span><br><span class="line">    <span class="keyword">public</span> TMP_InputField PortInput;</span><br><span class="line">    <span class="keyword">public</span> TMP_InputField UserNameInput;</span><br><span class="line">    <span class="keyword">public</span> TMP_InputField Password;</span><br><span class="line">    <span class="keyword">public</span> TMP_InputField Topic;</span><br><span class="line">    <span class="keyword">public</span> TMP_InputField Message;</span><br><span class="line">    <span class="keyword">public</span> TMP_Text SublistText;</span><br><span class="line">    <span class="keyword">public</span> TMP_Text ReciveText;</span><br><span class="line">    </span><br><span class="line">    <span class="keyword">public</span> Button UpdateButton;</span><br><span class="line">    <span class="keyword">public</span> Button SubscribeButton;</span><br><span class="line">    <span class="keyword">public</span> Button AddButton;</span><br><span class="line">    <span class="keyword">public</span> Button ClearButton;</span><br><span class="line">    <span class="keyword">public</span> Button ConnectButton;</span><br><span class="line">    <span class="keyword">public</span> Button DisConnectButton;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> SpriteRenderer SpriteRender;</span><br><span class="line">    <span class="keyword">private</span> MqttClient client;</span><br><span class="line">    <span class="keyword">private</span> List&lt;<span class="built_in">string</span>&gt; SubList;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">private</span> <span class="built_in">string</span> ReciveString;</span><br><spa
